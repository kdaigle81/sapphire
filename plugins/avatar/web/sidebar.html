<style>
    #avatar-display.avatar-fullwindow {
        position: fixed !important;
        inset: 0 !important;
        z-index: 9999 !important;
        background: #000 !important;
        border-radius: 0 !important;
        padding: 0 !important;
    }
    @media (max-width: 768px) {
        #avatar-display.avatar-fullwindow {
            bottom: 56px !important; /* clear mobile nav rail */
        }
    }
    #avatar-display.avatar-fullwindow #avatar-canvas {
        width: 100% !important;
        height: 100% !important;
        border-radius: 0 !important;
    }
    #avatar-display:fullscreen {
        background: #000;
    }
    #avatar-display:fullscreen #avatar-canvas {
        width: 100%;
        height: 100%;
        border-radius: 0;
    }
    #avatar-controls {
        position: absolute;
        top: 6px;
        right: 6px;
        display: flex;
        gap: 4px;
        z-index: 2;
        opacity: 0;
        transition: opacity 0.2s;
    }
    #avatar-display:hover #avatar-controls,
    #avatar-display.avatar-fullwindow #avatar-controls,
    #avatar-display:fullscreen #avatar-controls {
        opacity: 1;
    }
    .avatar-ctrl-btn {
        width: 28px;
        height: 28px;
        border: none;
        border-radius: 4px;
        background: rgba(0,0,0,0.5);
        color: #fff;
        font-size: 16px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        backdrop-filter: blur(4px);
        line-height: 1;
        padding: 0;
    }
    .avatar-ctrl-btn:hover {
        background: rgba(74,158,255,0.6);
    }
    .avatar-ctrl-btn.orbit-active {
        background: rgba(74,158,255,0.35);
        border: 1px solid rgba(74,158,255,0.5);
    }

    /* Fullwindow STT mic */
    #avatar-mic {
        display: none;
        position: absolute;
        bottom: 32px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 3;
        width: 56px;
        height: 56px;
        border: 2px solid rgba(74,158,255,0.4);
        border-radius: 50%;
        background: rgba(0,0,0,0.6);
        color: #fff;
        font-size: 24px;
        cursor: pointer;
        backdrop-filter: blur(4px);
        transition: background 0.15s, border-color 0.15s;
        user-select: none;
        -webkit-user-select: none;
    }
    #avatar-mic:hover { border-color: rgba(74,158,255,0.8); }
    #avatar-mic.recording {
        background: rgba(255,50,50,0.5);
        border-color: rgba(255,50,50,0.8);
    }
    #avatar-mic.tts-playing {
        background: rgba(74,158,255,0.3);
    }
    #avatar-display.avatar-fullwindow #avatar-mic,
    #avatar-display:fullscreen #avatar-mic {
        display: flex;
        align-items: center;
        justify-content: center;
    }

    /* ═══ Chat overlay (WoW-style) ═══ */
    #avatar-chat {
        display: none;
        position: absolute;
        bottom: 16px;
        left: 16px;
        z-index: 4;
        width: 800px;
        max-width: 30vw;
        font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    }
    #avatar-display.avatar-fullwindow #avatar-chat,
    #avatar-display:fullscreen #avatar-chat {
        display: flex;
        flex-direction: column;
    }

    /* Chat log */
    #avatar-chat-log {
        max-height: 260px;
        overflow-y: auto;
        padding: 10px 12px;
        background: rgba(0,0,0,0.35);
        backdrop-filter: blur(4px);
        border-radius: 8px 8px 0 0;
        scrollbar-width: thin;
        scrollbar-color: rgba(255,255,255,0.15) transparent;
        transition: max-height 0.3s, padding 0.3s, opacity 0.3s;
    }
    #avatar-chat.collapsed #avatar-chat-log {
        max-height: 0;
        padding: 0 12px;
        opacity: 0;
        overflow: hidden;
    }

    .chat-msg {
        margin: 3px 0;
        font-size: 13px;
        line-height: 1.4;
        word-wrap: break-word;
    }
    .chat-msg-user {
        color: rgba(180,220,255,0.9);
    }
    .chat-msg-user::before {
        content: 'You: ';
        color: rgba(120,170,255,0.7);
        font-weight: 600;
    }
    .chat-msg-ai {
        color: rgba(220,220,230,0.85);
    }
    .chat-msg-ai::before {
        content: 'Sapphire: ';
        color: rgba(74,158,255,0.7);
        font-weight: 600;
    }
    .chat-msg-system {
        color: rgba(180,180,180,0.5);
        font-size: 11px;
        font-style: italic;
    }

    /* Chat toolbar bar */
    #avatar-chat-bar {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 6px 10px;
        background: rgba(0,0,0,0.4);
        backdrop-filter: blur(4px);
        border-radius: 0 0 8px 8px;
    }
    #avatar-chat.collapsed #avatar-chat-bar {
        border-radius: 8px;
    }

    .chat-bar-btn {
        border: none;
        border-radius: 4px;
        background: rgba(255,255,255,0.1);
        color: rgba(255,255,255,0.7);
        font-size: 12px;
        padding: 4px 10px;
        cursor: pointer;
        white-space: nowrap;
    }
    .chat-bar-btn:hover {
        background: rgba(255,255,255,0.2);
        color: #fff;
    }
    .chat-bar-btn.stop-btn {
        color: rgba(255,100,100,0.9);
        display: none;
    }
    .chat-bar-btn.stop-btn.visible {
        display: inline-block;
    }

    #avatar-chat-volume {
        width: 70px;
        height: 3px;
        -webkit-appearance: none;
        appearance: none;
        background: rgba(255,255,255,0.15);
        border-radius: 2px;
        outline: none;
        cursor: pointer;
    }
    #avatar-chat-volume::-webkit-slider-thumb {
        -webkit-appearance: none;
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background: rgba(74,158,255,0.8);
        cursor: pointer;
    }
    #avatar-chat-volume::-moz-range-thumb {
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background: rgba(74,158,255,0.8);
        border: none;
        cursor: pointer;
    }
    .chat-bar-label {
        color: rgba(255,255,255,0.4);
        font-size: 11px;
        user-select: none;
    }
    .chat-bar-spacer { flex: 1; }
</style>
<div id="avatar-display" style="position:relative; width:100%; padding:0;">
    <canvas id="avatar-canvas" style="width:100%; height:280px; display:block; border-radius:6px;"></canvas>
    <div id="avatar-controls">
        <select id="avatar-location-select" title="Location" style="
            height: 28px; border: none; border-radius: 4px;
            background: rgba(0,0,0,0.5); color: #fff; font-size: 11px;
            padding: 0 6px; cursor: pointer; backdrop-filter: blur(4px);
            outline: none;
        "></select>
        <button class="avatar-ctrl-btn" id="avatar-btn-orbit" title="Toggle auto-orbit">&#x27F3;</button>
        <button class="avatar-ctrl-btn" id="avatar-btn-expand" title="Expand">&#x2922;</button>
        <button class="avatar-ctrl-btn" id="avatar-btn-fullscreen" title="Fullscreen">&#x26F6;</button>
    </div>
    <button id="avatar-mic" title="Hold to talk">&#x1F3A4;</button>

    <!-- Chat overlay (WoW-style) -->
    <div id="avatar-chat">
        <div id="avatar-chat-log"></div>
        <div id="avatar-chat-bar">
            <button class="chat-bar-btn" id="avatar-chat-toggle" title="Toggle chat log">&#x25BC;</button>
            <button class="chat-bar-btn stop-btn" id="avatar-chat-stop" title="Stop generation">Stop</button>
            <span class="chat-bar-spacer"></span>
            <span class="chat-bar-label">Vol</span>
            <input type="range" id="avatar-chat-volume" min="0" max="100" value="80" title="Volume">
        </div>
    </div>

    <div id="avatar-status" style="position:absolute; bottom:4px; left:0; right:0; text-align:center; font-size:0.7rem; color:var(--text-muted); pointer-events:none;"></div>
</div>
